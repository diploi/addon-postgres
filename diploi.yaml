diploiVersion: v1.0
type: addon
name: PostgreSQL
description: Official PostgreSQL addon for Diploi.

parameterGroups:
  - name: Connection
    identifier: postgres
    description: Superuser & connection configuration
    parameters:
      - name: Host
        identifier: POSTGRES_HOST
        defaultValue: postgres.${DIPLOI_NAMESPACE}
        type: string
        readOnly: true
      - name: Port
        identifier: POSTGRES_PORT
        defaultValue: 5432
        type: integer
      - name: User
        identifier: POSTGRES_USER
        defaultValue: postgres
        type: string
        contexts: label=postgres,label=app
      - name: Password
        identifier: POSTGRES_PASSWORD
        defaultValue: postgres
        type: secret
      - name: Database
        identifier: POSTGRES_DB
        defaultValue: app
        type: string
      - name: Database_url
        identifier: DATABASE_URL
        defaultValue: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        type: string

connectionStrings:
  - name: Connection URI
    value: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    description: This connection URI is for components within the deployment and is inaccessible externally.

logs:
  - name: PostgreSQL Log
    type: log
    labelSelector: app=postgres
    
images:
  - identifier: postgres
    image: postgres:18.3
    
storage:
  - identifier: postgres
    sizeMiB: 6144
